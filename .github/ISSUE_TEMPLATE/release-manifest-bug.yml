name: Release manifest / updater issue
description: Report a problem with latest.json, checksums, or the auto-updater
title: "[Updater] "
labels: ["updater"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for issues with update manifests, checksums, or the in-app updater.
        For application bugs, use the [main repository](https://github.com/ankhangbc2021-oss/App-create-repo/issues).

  - type: input
    id: installed-version
    attributes:
      label: Installed app version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - windows-x86_64
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the updater behavior or manifest problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: manifest
    attributes:
      label: latest.json (if relevant)
      description: Paste the manifest URL or contents you were checking against.
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Error message or logs
      description: Output from Settings → System → Check for Updates, if any.
      render: shell
